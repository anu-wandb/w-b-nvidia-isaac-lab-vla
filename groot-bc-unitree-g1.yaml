        "state": ModalityConfig(
            delta_indices=[0],
            modality_keys=[
                "left_leg",
                "right_leg",
                "waist",
                "left_arm",
                "left_hand",
                "right_arm",
                "right_hand",
            ],
        ),
        "action": ModalityConfig(
            delta_indices=list(range(16)),
            modality_keys=[
                "left_leg",
                "right_leg",
                "waist",
                "left_arm",
                "left_hand",
                "right_arm",
                "right_hand",
            ],
            action_configs=[
                ActionConfig(rep=ActionRepresentation.RELATIVE, type=ActionType.NON_EEF, format=ActionFormat.DEFAULT),
                ActionConfig(rep=ActionRepresentation.RELATIVE, type=ActionType.NON_EEF, format=ActionFormat.DEFAULT),
                ActionConfig(rep=ActionRepresentation.ABSOLUTE, type=ActionType.NON_EEF, format=ActionFormat.DEFAULT),
                ActionConfig(rep=ActionRepresentation.RELATIVE, type=ActionType.NON_EEF, format=ActionFormat.DEFAULT),
                ActionConfig(rep=ActionRepresentation.ABSOLUTE, type=ActionType.NON_EEF, format=ActionFormat.DEFAULT),
                ActionConfig(rep=ActionRepresentation.RELATIVE, type=ActionType.NON_EEF, format=ActionFormat.DEFAULT),
                ActionConfig(rep=ActionRepresentation.ABSOLUTE, type=ActionType.NON_EEF, format=ActionFormat.DEFAULT),
            ],
        ),
        "language": ModalityConfig(
            delta_indices=[0],
            modality_keys=["annotation.human.task_description"],
        ),
    }

    register_modality_config(g1_teleop_config, embodiment_tag=EmbodimentTag.NEW_EMBODIMENT)

  sweep_runner.py: |
    """W&B Sweep runner for GR00T BC hyperparameter tuning.

    Sweeps over: max_steps, learning_rate, grad_accum_steps, warmup_ratio, weight_decay.
    Uses Bayesian optimization to minimize eval/best_loss.
    Training runs WITHOUT --use-wandb to avoid nested wandb session conflicts;
    training curves are reconstructed from trainer_state.json after each trial.
    """
    import os, json, shutil, subprocess
    from pathlib import Path
    import wandb
    import numpy as np

    SWEEP_CONFIG = {
        "method": "bayes",
        "name": "groot-bc-g1-hparam-sweep-v2",
        "metric": {"name": "eval/best_loss", "goal": "minimize"},
        "parameters": {
            "max_steps": {
                "values": [10000, 15000, 20000, 30000],
            },
            "learning_rate": {
                "distribution": "log_uniform_values",
                "min": 5e-5,
                "max": 3e-4,
            },
            "grad_accum_steps": {
                "values": [16, 32, 64],
            },
            "warmup_ratio": {
                "values": [0.03, 0.05, 0.1],
            },
            "weight_decay": {
                "distribution": "log_uniform_values",
                "min": 1e-5,
                "max": 5e-4,
            },
        },
    }

    def run_trial():
        """Execute one sweep trial. Called by wandb.agent for each config."""
        run = wandb.init()
        config = wandb.config

        # Log input artifacts (base model + dataset) so W&B graph shows lineage
        entity = os.environ.get("WANDB_ENTITY", "wandb-smle")
        project = os.environ.get("WANDB_PROJECT", "isaacsim-nvidia-vla-crwv")
        try:
            run.use_artifact(f"{entity}/{project}/groot-n1.6-3b:latest", type="model")
        except Exception:
            pass  # artifact may not exist yet
        try:
            run.use_artifact(f"{entity}/{project}/g1-teleop-dataset:latest", type="dataset")
        except Exception:
            pass

        max_steps = config.max_steps
        lr = config.learning_rate
        grad_accum = config.grad_accum_steps
        warmup = config.warmup_ratio
        wd = config.weight_decay

        save_steps = max(max_steps // 5, 500)
        eff_batch = 32 * grad_accum

        print(f"\n{'='*60}")
        print(f"[sweep] Trial: {run.name} (id={run.id})")
        print(f"[sweep] max_steps={max_steps}, lr={lr:.2e}")
        print(f"[sweep] grad_accum={grad_accum}, effective_batch={eff_batch}")
        print(f"[sweep] warmup={warmup}, weight_decay={wd:.2e}")
        print(f"[sweep] save_steps={save_steps}")
        print(f"{'='*60}\n")

        # Clean output from previous trial
        output_dir = Path("/workspace/output")
        if output_dir.exists():
            shutil.rmtree(str(output_dir))
        output_dir.mkdir(parents=True)

        cmd = [
            "torchrun", "--nproc_per_node=8", "--standalone",
            "gr00t/experiment/launch_finetune.py",
            "--dataset-path", "/workspace/data/dataset",
            "--base-model-path", "/workspace/data/model",
            "--output-dir", str(output_dir),
            "--embodiment-tag", os.environ.get("EMBODIMENT_TAG", "NEW_EMBODIMENT"),
            "--modality-config-path", "/workspace/Isaac-GR00T/g1_teleop_config.py",
            "--num-gpus", "8",
            "--global-batch-size", "32",
            "--gradient-accumulation-steps", str(grad_accum),
            "--max-steps", str(max_steps),
            "--save-steps", str(save_steps),
            "--save-total-limit", "3",
            "--learning-rate", str(lr),
            "--warmup-ratio", str(warmup),
            "--weight-decay", str(wd),
            "--dataloader-num-workers", "6",
            # No --use-wandb: training curves reconstructed from trainer_state.json
        ]

        result = subprocess.run(cmd, cwd="/workspace/Isaac-GR00T")

        if result.returncode != 0:
            print(f"[sweep] Training FAILED (rc={result.returncode})")
            wandb.log({"eval/best_loss": 999.0, "eval/final_loss": 999.0})
            run.summary["status"] = "failed"
            wandb.finish()
            return

        print("[sweep] Training complete, parsing results...")

        # Find checkpoints
        ckpts = sorted([
            d for d in output_dir.iterdir()
            if d.is_dir() and d.name.startswith("checkpoint")
        ])

        if not ckpts:
            print("[sweep] No checkpoints found")
            wandb.log({"eval/best_loss": 999.0, "eval/final_loss": 999.0})
            run.summary["status"] = "no_checkpoints"
            wandb.finish()
            return

        # Parse full training history from latest checkpoint
        latest = ckpts[-1]
        ts_path = latest / "trainer_state.json"

        best_loss = None
        final_loss = None

        if ts_path.exists():
            state = json.loads(ts_path.read_text())
            for entry in state.get("log_history", []):
                step_num = entry.get("step", 0)
                log_data = {}
                if "loss" in entry:
                    loss_val = entry["loss"]
                    log_data["train/loss"] = loss_val
                    if best_loss is None or loss_val < best_loss:
                        best_loss = loss_val
                    final_loss = loss_val
                if "learning_rate" in entry:
                    log_data["train/lr"] = entry["learning_rate"]
                if "grad_norm" in entry:
                    log_data["train/grad_norm"] = entry["grad_norm"]
                if log_data:
                    wandb.log(log_data, step=step_num)

                # Also check for train_loss (final summary entry)
                if "train_loss" in entry and best_loss is None:
                    best_loss = entry["train_loss"]
                    final_loss = entry["train_loss"]

        if best_loss is not None:
            wandb.log({"eval/best_loss": best_loss, "eval/final_loss": final_loss})
            run.summary["best_loss"] = best_loss
            run.summary["final_loss"] = final_loss
            run.summary["status"] = "success"
            print(f"[sweep] best_loss={best_loss:.4f}, final_loss={final_loss:.4f}")
        else:
            wandb.log({"eval/best_loss": 999.0})
            run.summary["status"] = "no_loss_found"
            print("[sweep] WARNING: No loss values found in trainer_state.json")

        run.summary["num_checkpoints"] = len(ckpts)
        run.summary["effective_batch_size"] = eff_batch
        print(f"[sweep] Checkpoints: {[c.name for c in ckpts]}")

        # Upload best checkpoint as W&B artifact for sim eval
        if ckpts:
            best_ckpt = ckpts[-1]
            art = wandb.Artifact(
                "groot-bc-g1-trial",
                type="model",
                description=f"Trial {run.name}: steps={max_steps}, lr={lr:.2e}, loss={best_loss}",
                metadata={
                    "trial_name": run.name,
                    "run_id": run.id,
                    "max_steps": max_steps,
                    "learning_rate": lr,
                    "grad_accum_steps": grad_accum,
                    "warmup_ratio": warmup,
                    "weight_decay": wd,
                    "best_loss": best_loss,
                    "final_loss": final_loss,
                    "checkpoint": best_ckpt.name,
                },
            )
            art.add_dir(str(best_ckpt), name="model")
            run.log_artifact(art).wait()
            print(f"[sweep] Uploaded artifact: groot-bc-g1-trial ({best_ckpt.name})")

        # --- Log eval videos from dataset for each checkpoint ---
        dataset_dir = Path("/workspace/data/dataset")
        video_dir = dataset_dir / "videos" / "chunk-000"
        if video_dir.exists():
            video_keys = sorted([d.name for d in video_dir.iterdir() if d.is_dir()])
            vkey = video_keys[0] if video_keys else None
            if vkey:
                info = json.loads((dataset_dir / "meta" / "info.json").read_text())
                total_eps = info["total_episodes"]
                eval_episodes = np.linspace(0, total_eps - 1, 5, dtype=int).tolist()
                vid_count = 0
                for ckpt in ckpts:
                    for ep_idx in eval_episodes:
                        vpath = video_dir / vkey / f"episode_{ep_idx:06d}.mp4"
                        if not vpath.exists():
                            continue
                        try:
                            key = f"eval/{ckpt.name}/episode_{ep_idx}"
                            vid = wandb.Video(str(vpath), format="mp4",
                                              fps=info.get("fps", 30))
                            wandb.log({key: vid})
                            vid_count += 1
                        except Exception as e:
                            print(f"[sweep] WARN video: {e}")
                print(f"[sweep] Logged {vid_count} eval videos")

        wandb.finish()

    def main():
        entity = os.environ.get("WANDB_ENTITY")
        project = os.environ.get("WANDB_PROJECT")
        num_trials = int(os.environ.get("NUM_SWEEP_TRIALS", "15"))

        # Clear single-run env vars that would interfere with sweep
        for key in ["WANDB_RUN_ID", "WANDB_RUN_NAME", "WANDB_RESUME", "WANDB_LOG_MODEL"]:
            os.environ.pop(key, None)

        # Resume existing sweep if pod restarted, otherwise create new
        sweep_id_file = Path("/workspace/sweep_id.txt")
        if sweep_id_file.exists():
            sweep_id = sweep_id_file.read_text().strip()
            print(f"[sweep] Resuming sweep: {sweep_id}")
        else:
            sweep_id = wandb.sweep(SWEEP_CONFIG, entity=entity, project=project)
            sweep_id_file.write_text(sweep_id)
            print(f"[sweep] Created sweep: {sweep_id}")

        print(f"[sweep] Dashboard: https://wandb.ai/{entity}/{project}/sweeps/{sweep_id}")
        print(f"[sweep] Running {num_trials} trials...")

        wandb.agent(sweep_id, function=run_trial, count=num_trials,
                    entity=entity, project=project)
        print("[sweep] All trials complete!")

    if __name__ == "__main__":
        main()

---
apiVersion: v1
kind: Service
metadata:
  name: groot-bc-g1
spec:
  clusterIP: None
  selector:
    app: groot-bc-g1
  ports:
    - name: nccl
      port: 29500
      targetPort: 29500
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: groot-bc-g1
spec:
  serviceName: groot-bc-g1
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: groot-bc-g1
  template:
    metadata:
      labels:
        app: groot-bc-g1
    spec:
      restartPolicy: Always
      volumes:
        - name: scripts
          configMap:
            name: groot-bc-g1-scripts
            defaultMode: 0755
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        - name: workspace
          emptyDir:
            sizeLimit: 500Gi
      containers:
        - name: train
          image: nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04
          command: ["/bin/bash", "/scripts/entrypoint.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # ---- W&B ----
            - name: WANDB_ENTITY
              value: wandb-smle
            - name: WANDB_PROJECT
              value: isaacsim-nvidia-vla-crwv
            # Run name format: gr00t-finetune-MM-DD-HH-MM (set in download_artifacts.py)
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-api-key
                  key: WANDB_API_KEY
            # ---- Artifacts ----
            - name: BASE_VLA_ARTIFACT
              value: wandb-smle/isaacsim-nvidia-vla-crwv/groot-n1.6-3b:v1
            - name: DATASET_ARTIFACT
              value: wandb-smle/isaacsim-nvidia-vla-crwv/groot-teleop-unitree-g1:v0
            # ---- Training / Sweep ----
            - name: EMBODIMENT_TAG
              value: NEW_EMBODIMENT
            - name: NUM_GPUS
              value: "8"
            - name: NUM_SWEEP_TRIALS
              value: "15"
            # ---- CUDA / NCCL ----
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: NCCL_DEBUG
              value: INFO
            - name: NCCL_SOCKET_IFNAME
              value: eth0
          resources:
            limits:
              nvidia.com/gpu: 8
              cpu: "64"
              memory: 512Gi
            requests:
              nvidia.com/gpu: 8
              cpu: "32"
              memory: 256Gi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: shm
              mountPath: /dev/shm
            - name: workspace
              mountPath: /workspace
