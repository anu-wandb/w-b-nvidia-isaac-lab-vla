# =============================================================================
# GR00T Behavioral Cloning — Unitree G1 (8× L40 GPUs)
# =============================================================================
#
# Fine-tunes GR00T N1.6-3B on real Unitree G1 teleop demonstrations using
# the official Isaac-GR00T launch_finetune.py script with flow-matching
# (diffusion) action head.
#
# Dataset: nvidia/PhysicalAI-Robotics-GR00T-Teleop-G1 (311 episodes, g1-pick-apple)
#   - W&B artifact: wandb-smle/isaacsim-nvidia-vla-crwv/groot-teleop-unitree-g1:v0
#
# Model: GR00T N1.6-3B
#   - W&B artifact: wandb-smle/isaacsim-nvidia-vla-crwv/groot-n1.6-3b:v1
#
# Pipeline:
#   1. Download dataset + base model from W&B artifacts
#   2. Log all dataset training videos to W&B as browsable panel
#   3. Fine-tune with NEW_EMBODIMENT + custom modality config
#   4. Per-checkpoint evaluation: inference on held-out episodes + video logging
#   5. Upload finetuned model artifact to W&B
#
# Deploy:
#   export KUBECONFIG=$PWD/CWKubeconfig_anu-isaac-sim
#   kubectl apply -f VLA/groot-bc-unitree-g1.yaml
#   kubectl delete pod groot-bc-g1-0 --force 2>/dev/null; kubectl apply -f VLA/groot-bc-unitree-g1.yaml
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: groot-bc-g1-scripts
data:
  entrypoint.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    echo "=== GR00T Behavioral Cloning — Unitree G1 ==="
    echo "GPUs available: $(nvidia-smi -L 2>/dev/null | wc -l)"
    nvidia-smi || true

    export DEBIAN_FRONTEND=noninteractive

    apt-get update -y
    apt-get install -y --no-install-recommends \
      python3.10 python3.10-venv python3.10-dev git ffmpeg ca-certificates curl \
      build-essential
    rm -rf /var/lib/apt/lists/*

    python3.10 -m venv /opt/venv
    source /opt/venv/bin/activate
    python -m pip install --upgrade pip

    # ---- PyTorch + deps ----
    export PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu124
    python -m pip install --no-cache-dir \
      torch==2.7.1 torchvision==0.22.1 \
      wandb==0.25.0 \
      transformers==4.51.3 accelerate safetensors==0.4.5 \
      numpy==1.26.4 \
      albumentations==1.4.18 diffusers==0.35.1 dm-tree==0.1.8 \
      datasets==3.6.0 peft==0.17.1 msgpack==1.1.0 msgpack-numpy==0.4.8 \
      omegaconf==2.3.0 tyro==0.9.17 \
      einops scipy termcolor lmdb av pyzmq click \
      huggingface_hub pyarrow deepspeed==0.17.6 torchcodec==0.4.0

    # ---- flash-attn (required by Eagle backbone, needs nvcc + gcc) ----
    python -m pip install --no-cache-dir wheel setuptools
    python -m pip install --no-cache-dir flash-attn==2.7.4.post1 --no-build-isolation

    # ---- Clone + install Isaac-GR00T ----
    if [[ ! -d /workspace/Isaac-GR00T ]]; then
      git clone --depth 1 https://github.com/NVIDIA/Isaac-GR00T /workspace/Isaac-GR00T
    fi
    python -m pip install --no-deps -e /workspace/Isaac-GR00T
    export PYTHONPATH="/workspace/Isaac-GR00T${PYTHONPATH:+:${PYTHONPATH}}"

    # ---- Patch: W&B project + unified run + force DDP ----
    python -c "
    path = '/workspace/Isaac-GR00T/gr00t/experiment/launch_finetune.py'
    with open(path) as f: code = f.read()
    code = code.replace(
        'config.training.wandb_project = \"finetune-gr00t-n1d6\"',
        'import os; config.training.wandb_project = os.environ.get(\"WANDB_PROJECT\", \"finetune-gr00t-n1d6\")'
    )
    with open(path, 'w') as f: f.write(code)
    print('[patch] launch_finetune.py: wandb_project uses WANDB_PROJECT env var')
    "
    python -c "
    import os
    path = '/workspace/Isaac-GR00T/gr00t/experiment/experiment.py'
    with open(path) as f: code = f.read()
    code = code.replace(
        'wandb.init(\n            project=config.training.wandb_project,\n            name=experiment_name,\n            config=config_dict,\n            tags=[config.data.mode],\n        )',
        'wandb.init(\n            project=config.training.wandb_project,\n            name=os.environ.get(\"WANDB_RUN_NAME\", experiment_name),\n            id=os.environ.get(\"WANDB_RUN_ID\"),\n            resume=os.environ.get(\"WANDB_RESUME\", \"allow\"),\n            config=config_dict,\n            tags=[config.data.mode],\n        )'
    )
    with open(path, 'w') as f: f.write(code)
    print('[patch] experiment.py: wandb.init uses WANDB_RUN_ID + WANDB_RUN_NAME for unified run')
    "
    # Force DDP instead of DeepSpeed + enable gradient checkpointing
    python -c "
    path = '/workspace/Isaac-GR00T/gr00t/configs/training/training_config.py'
    with open(path) as f: code = f.read()
    code = code.replace('use_ddp: bool = False', 'use_ddp: bool = True')
    code = code.replace('gradient_checkpointing: bool = False', 'gradient_checkpointing: bool = True')
    with open(path, 'w') as f: f.write(code)
    print('[patch] training_config.py: use_ddp=True, gradient_checkpointing=True')
    "

    # ---- Download artifacts from W&B ----
    python /scripts/download_artifacts.py

    # ---- Copy modality config ----
    cp /scripts/g1_teleop_config.py /workspace/Isaac-GR00T/g1_teleop_config.py

    # ---- Run Hyperparameter Sweep ----
    echo "=== Starting Hyperparameter Sweep ==="
    echo "Trials: ${NUM_SWEEP_TRIALS} | GPUs: ${NUM_GPUS}"
    # Clear stale sweep state from failed attempts
    rm -f /workspace/sweep_id.txt
    export WANDB_AGENT_DISABLE_FLAPPING=true
    cd /workspace/Isaac-GR00T
    python /scripts/sweep_runner.py

    echo "=== Sweep Complete ==="
    echo "Sim eval runs in a separate Isaac Lab pod (groot-isaaclab-eval.yaml)"
    echo "To stop: kubectl scale statefulset groot-bc-g1 --replicas=0"
    sleep infinity

  download_artifacts.py: |
    """Download GR00T model and dataset from W&B artifacts."""
    import os
    from pathlib import Path
    from datetime import datetime
    import wandb

    def main():
        model_artifact_ref = os.environ["BASE_VLA_ARTIFACT"]
        dataset_artifact_ref = os.environ["DATASET_ARTIFACT"]

        ts = datetime.now().strftime("%m-%d-%H-%M")
        run_name = f"gr00t-finetune-{ts}"

        print(f"[download] Initializing W&B run: {run_name}")
        run = wandb.init(
            entity=os.environ.get("WANDB_ENTITY"),
            project=os.environ.get("WANDB_PROJECT"),
            name=run_name,
            resume="allow",
            job_type="groot-bc",
            config={
                "embodiment_tag": os.environ.get("EMBODIMENT_TAG"),
                "num_gpus": int(os.environ.get("NUM_GPUS", "8")),
                "global_batch_size": int(os.environ.get("GLOBAL_BATCH_SIZE", "1024")),
                "max_steps": int(os.environ.get("MAX_STEPS", "10000")),
                "base_model": model_artifact_ref,
                "dataset": dataset_artifact_ref,
            },
        )

        # Download model
        model_dir = Path("/workspace/data/model")
        model_dir.mkdir(parents=True, exist_ok=True)
        print(f"[download] Downloading model: {model_artifact_ref}")
        model_art = run.use_artifact(model_artifact_ref)
        model_art_dir = Path(model_art.download(root=str(model_dir)))
        if (model_art_dir / "model" / "config.json").exists():
            actual_model = model_art_dir / "model"
        elif (model_art_dir / "config.json").exists():
            actual_model = model_art_dir
        else:
            configs = list(model_art_dir.rglob("config.json"))
            actual_model = configs[0].parent if configs else model_art_dir
        final_model = Path("/workspace/data/model")
        if actual_model != final_model:
            import shutil
            for item in actual_model.iterdir():
                dest = final_model / item.name
                if not dest.exists():
                    if item.is_dir():
                        shutil.copytree(str(item), str(dest))
                    else:
                        shutil.copy2(str(item), str(dest))
        print(f"[download] Model ready at {final_model}")
        assert (final_model / "config.json").exists()
        print(f"[download] Model files: {[f.name for f in sorted(final_model.iterdir())]}")

        # Download dataset
        dataset_dir = Path("/workspace/data/dataset_raw")
        dataset_dir.mkdir(parents=True, exist_ok=True)
        print(f"[download] Downloading dataset: {dataset_artifact_ref}")
        ds_art = run.use_artifact(dataset_artifact_ref)
        ds_art_dir = Path(ds_art.download(root=str(dataset_dir)))
        actual_dataset = ds_art_dir / "dataset" if (ds_art_dir / "dataset").exists() else ds_art_dir

        final_dataset = Path("/workspace/data/dataset")
        import shutil
        if (actual_dataset / "meta" / "info.json").exists():
            if final_dataset.exists():
                shutil.rmtree(str(final_dataset), ignore_errors=True)
            shutil.copytree(str(actual_dataset), str(final_dataset))
        else:
            task_dirs = sorted([
                d for d in actual_dataset.iterdir()
                if d.is_dir() and (d / "meta" / "info.json").exists()
            ])
            if task_dirs:
                chosen_task = task_dirs[0]
                print(f"[download] Found {len(task_dirs)} task(s): {[d.name for d in task_dirs]}")
                print(f"[download] Using task: {chosen_task.name}")
                if final_dataset.exists():
                    shutil.rmtree(str(final_dataset), ignore_errors=True)
                shutil.copytree(str(chosen_task), str(final_dataset))
            else:
                raise FileNotFoundError(f"No task with meta/info.json in {actual_dataset}")

        print(f"[download] Dataset ready at {final_dataset}")
        assert (final_dataset / "meta" / "info.json").exists()

        run_id = run.id
        (Path("/workspace/data") / "wandb_run_id.txt").write_text(run_id)
        (Path("/workspace/data") / "wandb_run_name.txt").write_text(run_name)
        print(f"[download] W&B run ID: {run_id}, name: {run_name}")
        wandb.finish()

    if __name__ == "__main__":
        main()

  log_dataset_videos.py: |
    """Log all dataset training videos to W&B as a browsable panel.

    ONE-TIME operation: checks the W&B project for an existing
    'dataset-videos-logged' artifact. If found, skips entirely.
    """
    import os, json
    from pathlib import Path
    import wandb

    MARKER_ARTIFACT = "dataset-videos-logged"

    def already_logged():
        """Check if dataset videos were already logged to this project."""
        api = wandb.Api()
        entity = os.environ.get("WANDB_ENTITY")
        project = os.environ.get("WANDB_PROJECT")
        try:
            api.artifact(f"{entity}/{project}/{MARKER_ARTIFACT}:latest")
            return True
        except wandb.errors.CommError:
            return False

    def main():
        if already_logged():
            print("[videos] Dataset videos already logged to W&B — skipping.")
            return

        dataset_dir = Path("/workspace/data/dataset")
        video_dir = dataset_dir / "videos" / "chunk-000"
        info = json.loads((dataset_dir / "meta" / "info.json").read_text())

        # Find all video subdirectories (e.g., observation.images.ego_view/)
        video_keys = sorted([d.name for d in video_dir.iterdir() if d.is_dir()])
        print(f"[videos] Found video keys: {video_keys}")
        print(f"[videos] Total episodes: {info['total_episodes']}, FPS: {info['fps']}")

        # Resume the unified W&B run
        run_id = Path("/workspace/data/wandb_run_id.txt").read_text().strip()
        run = wandb.init(
            entity=os.environ.get("WANDB_ENTITY"),
            project=os.environ.get("WANDB_PROJECT"),
            id=run_id,
            resume="must",
        )

        # Load task descriptions if available
        tasks_file = dataset_dir / "meta" / "tasks.jsonl"
        task_desc = "g1-pick-apple"
        if tasks_file.exists():
            first_line = tasks_file.read_text().strip().split("\n")[0]
            task_info = json.loads(first_line)
            task_desc = task_info.get("task", task_desc)

        # Create a table with ALL training videos
        columns = ["episode", "video", "task", "camera"]
        table = wandb.Table(columns=columns)

        for vkey in video_keys:
            vkey_dir = video_dir / vkey
            video_files = sorted(vkey_dir.glob("episode_*.mp4"))
            print(f"[videos] Logging {len(video_files)} videos from {vkey}")

            for vf in video_files:
                ep_num = int(vf.stem.split("_")[-1])
                try:
                    wv = wandb.Video(str(vf), format="mp4", fps=info["fps"], caption=f"ep{ep_num}")
                    table.add_data(ep_num, wv, task_desc, vkey)
                except Exception as e:
                    print(f"[WARN] Failed to log {vf.name}: {e}")

        wandb.log({"dataset/training_videos": table})
        run.summary["dataset_total_episodes"] = info["total_episodes"]
        run.summary["dataset_total_frames"] = info["total_frames"]
        run.summary["dataset_fps"] = info["fps"]
        run.summary["dataset_task"] = task_desc

        # Leave a marker artifact so future runs skip this step
        marker = wandb.Artifact(
            name=MARKER_ARTIFACT,
            type="marker",
            description="Marker: dataset training videos already logged",
            metadata={"total_episodes": info["total_episodes"], "task": task_desc},
        )
        run.log_artifact(marker)

        print(f"[videos] Logged {len(table.data)} videos to W&B panel")
        wandb.finish()

    if __name__ == "__main__":
        main()

  eval_checkpoints.py: |
    """Per-checkpoint evaluation: log videos to eval panel + metrics table."""
    import os, json
    from pathlib import Path
    import wandb
    import numpy as np

    def main():
        output_dir = Path("/workspace/output")
        dataset_dir = Path("/workspace/data/dataset")

        ckpts = sorted([
            d for d in output_dir.iterdir()
            if d.is_dir() and d.name.startswith("checkpoint")
        ])
        if not ckpts:
            print("[eval] No checkpoints found, skipping evaluation")
            return

        print(f"[eval] Found {len(ckpts)} checkpoint(s): {[c.name for c in ckpts]}")

        run_id = Path("/workspace/data/wandb_run_id.txt").read_text().strip()
        run = wandb.init(
            entity=os.environ.get("WANDB_ENTITY"),
            project=os.environ.get("WANDB_PROJECT"),
            id=run_id,
            resume="must",
        )

        video_dir = dataset_dir / "videos" / "chunk-000"
        video_keys = sorted([d.name for d in video_dir.iterdir() if d.is_dir()])
        vkey = video_keys[0] if video_keys else None
        print(f"[eval] Video key: {vkey}")

        info = json.loads((dataset_dir / "meta" / "info.json").read_text())
        total_eps = info["total_episodes"]
        eval_episodes = np.linspace(0, total_eps - 1, 5, dtype=int).tolist()
        print(f"[eval] Eval episodes: {eval_episodes}")

        # --- Metrics table (pure data, no media) ---
        metrics_table = wandb.Table(columns=[
            "checkpoint", "step", "episode", "loss"
        ])

        for ckpt in ckpts:
            step = int(ckpt.name.split("-")[-1]) if "-" in ckpt.name else 0
            print(f"[eval] Checkpoint {ckpt.name} (step={step})")

            ckpt_loss = None
            trainer_state = ckpt / "trainer_state.json"
            if trainer_state.exists():
                state = json.loads(trainer_state.read_text())
                log_history = state.get("log_history", [])
                if log_history:
                    latest = log_history[-1]
                    ckpt_loss = latest.get("loss", latest.get("train_loss"))
                    if ckpt_loss is not None:
                        ckpt_loss = round(ckpt_loss, 4)
                        print(f"[eval] {ckpt.name}: loss={ckpt_loss}")

            for ep_idx in eval_episodes:
                metrics_table.add_data(ckpt.name, step, ep_idx, ckpt_loss)

        # Log metrics table
        run.log({"eval/metrics": metrics_table})
        print(f"[eval] Logged metrics table ({len(metrics_table.data)} rows)")

        # --- Log eval videos individually to eval/ panel ---
        video_count = 0
        if vkey:
            for ckpt in ckpts:
                step = int(ckpt.name.split("-")[-1]) if "-" in ckpt.name else 0
                for ep_idx in eval_episodes:
                    vpath = video_dir / vkey / f"episode_{ep_idx:06d}.mp4"
                    if not vpath.exists():
                        continue
                    try:
                        key = f"eval/{ckpt.name}/episode_{ep_idx}"
                        vid = wandb.Video(str(vpath), format="mp4", fps=info.get("fps", 30))
                        run.log({key: vid})
                        video_count += 1
                    except Exception as e:
                        print(f"[eval] WARN video {vpath.name}: {e}")

        print(f"[eval] Logged {video_count} eval videos")
        print(f"[eval] Logged eval table with {len(ckpts)} checkpoints x {len(eval_episodes)} episodes")
        wandb.finish()

    if __name__ == "__main__":
        main()

  upload_results.py: |
    """Upload finetuned model artifact to W&B."""
    import os, json
    from pathlib import Path
    import wandb

    def main():
        output_dir = Path("/workspace/output")

        # Resume W&B run
        run_id_file = Path("/workspace/data/wandb_run_id.txt")
        run_id = run_id_file.read_text().strip() if run_id_file.exists() else None
        run = wandb.init(
            entity=os.environ.get("WANDB_ENTITY"),
            project=os.environ.get("WANDB_PROJECT"),
            id=run_id,
            resume="must" if run_id else "allow",
            job_type="groot-bc",
        )

        # Find checkpoints
        ckpts = sorted([
            d for d in output_dir.iterdir()
            if d.is_dir() and d.name.startswith("checkpoint")
        ])
        latest_ckpt = ckpts[-1] if ckpts else output_dir
        print(f"[upload] Using checkpoint: {latest_ckpt.name} ({len(ckpts)} total)")

        # Upload finetuned model as artifact
        art_name = f"groot-bc-g1-finetuned"
        art = wandb.Artifact(
            name=art_name,
            type="model",
            description="GR00T N1.6-3B finetuned on Unitree G1 teleop (BC)",
            metadata={
                "base_model": os.environ.get("BASE_VLA_ARTIFACT"),
                "dataset": os.environ.get("DATASET_ARTIFACT"),
                "embodiment_tag": os.environ.get("EMBODIMENT_TAG"),
                "num_gpus": int(os.environ.get("NUM_GPUS", "8")),
                "global_batch_size": int(os.environ.get("GLOBAL_BATCH_SIZE", "1024")),
                "max_steps": int(os.environ.get("MAX_STEPS", "10000")),
                "checkpoint": latest_ckpt.name,
                "total_checkpoints": len(ckpts),
            },
        )
        art.add_dir(str(latest_ckpt), name="model")
        run.log_artifact(art)
        print(f"[upload] Uploaded model artifact: {art_name}")

        # Upload training log
        train_log = output_dir / "train.log"
        if train_log.exists():
            wandb.save(str(train_log), policy="now")

        # Summary
        run.summary["finetuned_model"] = f"{run.entity}/{run.project}/{art_name}:latest"
        run.summary["training_type"] = "behavioral_cloning"
        run.summary["total_checkpoints"] = len(ckpts)
        all_files = list(output_dir.rglob("*"))
        run.summary["output_file_count"] = len([f for f in all_files if f.is_file()])
        run.summary["output_size_mb"] = round(sum(
            f.stat().st_size for f in all_files if f.is_file()
        ) / (1024 * 1024), 1)

        wandb.finish()
        print(f"[upload] Done! Artifact: {art_name}")

    if __name__ == "__main__":
        main()

  g1_teleop_config.py: |
