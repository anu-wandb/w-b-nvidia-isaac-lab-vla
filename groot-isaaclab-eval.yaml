apiVersion: v1
kind: ConfigMap
metadata:
  name: groot-eval-sim-scripts
data:
  sim_entrypoint.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    ISAAC_PY="/workspace/isaaclab/_isaac_sim/python.sh"
    ISAACLAB_SH="/workspace/isaaclab/isaaclab.sh"
    if [[ ! -x "${ISAAC_PY}" ]]; then
      echo "FATAL: ${ISAAC_PY} not found or not executable" >&2
      exit 1
    fi
    if [[ ! -x "${ISAACLAB_SH}" ]]; then
      echo "FATAL: ${ISAACLAB_SH} not found or not executable" >&2
      exit 1
    fi

    "${ISAAC_PY}" -m pip install --no-cache-dir -q grpcio==1.66.2 gymnasium==1.2.1 imageio==2.34.1 imageio-ffmpeg==0.4.9

    # Ensure PYTHONPATH includes /scripts so g1_manip_env_cfg.py is importable
    export PYTHONPATH="/scripts${PYTHONPATH:+:${PYTHONPATH}}"

    # Source Isaac Sim env if available
    set +u
    if [[ -f /workspace/isaaclab/setup_python_env.sh ]]; then
      source /workspace/isaaclab/setup_python_env.sh
    elif [[ -f /workspace/isaaclab/_isaac_sim/setup_python_env.sh ]]; then
      source /workspace/isaaclab/_isaac_sim/setup_python_env.sh
    fi
    set -u

    export OMNI_KIT_ACCEPT_EULA=YES
    export ACCEPT_EULA=Y
    export PRIVACY_CONSENT=Y

    exec "${ISAACLAB_SH}" -p /scripts/sim_server.py

  sim_server.py: |
    #!/usr/bin/env python3
    """
    Isaac Lab simulation gRPC server for GR00T closed-loop evaluation.

    Enhanced from groot-rft-two-container.yaml:
    - Returns camera frames in Reset/Step responses (for GR00T visual input)
    - Adds GetJointNames RPC (for dynamic joint mapping)
    - Uses G1 humanoid with joint position control
    """
    import os, sys, argparse

    # Step 1: Bootstrap Isaac Sim via AppLauncher (MUST happen before any isaaclab imports)
    from isaaclab.app import AppLauncher
    parser = argparse.ArgumentParser(description="Isaac Lab Sim Server - G1 Eval")
    AppLauncher.add_app_launcher_args(parser)
    args = parser.parse_args(["--headless", "--enable_cameras"])
    app_launcher = AppLauncher(args)
    simulation_app = app_launcher.app

    # Step 2: NOW safe to import everything else
    import time, pickle, threading, queue
    from concurrent import futures
    import numpy as np
    import grpc
    import gymnasium as gym
    from gymnasium.wrappers import RecordVideo
    import torch

    # Register Isaac Lab tasks
    import isaaclab_tasks  # noqa: F401

    # Register our custom G1 env (must happen after isaaclab imports)
    try:
        import g1_manip_env_cfg  # noqa: F401
        print("[SIM] Custom G1 env registered: Isaac-G1-ManipJointCtrl-v0")
    except Exception as e:
        print(f"[SIM] WARN: Custom env registration failed: {e}")
        print("[SIM] Will use ISAAC_TASK env var as-is")

    from isaaclab_tasks.utils.parse_cfg import parse_env_cfg

    def _to_cpu(obj):
        """Recursively move tensors to CPU/numpy for serialization."""
        if isinstance(obj, torch.Tensor):
            return obj.detach().cpu().numpy()
        if isinstance(obj, dict):
            return {k: _to_cpu(v) for k, v in obj.items()}
        if isinstance(obj, (list, tuple)):
            return type(obj)(_to_cpu(v) for v in obj)
        return obj

    def _serialize(obj):
        return pickle.dumps(_to_cpu(obj), protocol=pickle.HIGHEST_PROTOCOL)

    def _deserialize(buf):
        return pickle.loads(buf)

    def _as_np(x):
        if isinstance(x, torch.Tensor):
            return x.detach().cpu().numpy()
        return np.asarray(x)

    def make_env(task_name: str, video_dir: str, video_every: int):
        env_cfg = parse_env_cfg(task_name, device="cuda:0", num_envs=1)
        env_cfg.scene.num_envs = 1
        env = gym.make(task_name, cfg=env_cfg, render_mode="rgb_array")
        # Don't wrap with RecordVideo — eval client records frames via gRPC
        return env

    def extract_proprio(obs):
        """Extract proprioception as a flat numpy vector from obs dict or tensor."""
        if isinstance(obs, dict):
            for k in ("policy", "proprio", "joint_pos", "qpos", "robot_state", "state"):
                if k in obs:
                    v = obs[k]
                    if isinstance(v, dict):
                        parts = [_as_np(vv).astype(np.float32).reshape(-1) for vv in v.values()]
                        return np.concatenate(parts)
                    return _as_np(v).astype(np.float32).reshape(-1)
            # Fallback: concatenate all small vectors
            for v in obs.values():
                v = _as_np(v)
                if v.ndim == 1 and v.size < 512:
                    return v.astype(np.float32)
        arr = _as_np(obs)
        if arr.ndim == 1:
            return arr.astype(np.float32)
        return arr.astype(np.float32).reshape(-1)

    def extract_joint_names(env):
        """Extract joint names from the Isaac Lab environment."""
        try:
            unwrapped = env.unwrapped
            if hasattr(unwrapped, 'scene') and hasattr(unwrapped.scene, 'articulations'):
                for name, art in unwrapped.scene.articulations.items():
                    if hasattr(art, 'joint_names'):
                        return list(art.joint_names)
            # Fallback: try data attribute
            if hasattr(unwrapped, 'robot') and hasattr(unwrapped.robot, 'joint_names'):
                return list(unwrapped.robot.joint_names)
        except Exception as e:
            print(f"[SIM] WARN: Could not extract joint names: {e}")
        return []

    # All env operations must run on main thread (Isaac Sim requirement)
    _request_queue = queue.Queue()

    class SimServer:
        def __init__(self, env, joint_names):
            self.env = env
            self.joint_names = joint_names
            self._episode = 0
            self._last_obs = None

        def _dispatch(self, op, payload=None):
            result_event = threading.Event()
            result_holder = [None, None]
            _request_queue.put((op, payload, result_event, result_holder))
            result_event.wait(timeout=60)
            if result_holder[1] is not None:
                raise result_holder[1]
            return result_holder[0]

        def Reset(self, request, context):
            return self._dispatch("reset")

        def Step(self, request, context):
            req = _deserialize(request)
            return self._dispatch("step", req["action"])

        def Render(self, request, context):
            return self._dispatch("render")

        def GetSpec(self, request, context):
            return self._dispatch("getspec")

        def GetJointNames(self, request, context):
            return _serialize({"joint_names": self.joint_names})

        def Close(self, request, context):
            return self._dispatch("close")

        def Health(self, request, context):
            return _serialize({"ok": True})

    def _render_frame(env):
        """Get a camera frame from the env."""
        try:
            frame = env.render()
            if frame is not None:
                return _as_np(frame)
        except Exception as e:
            print(f"[SIM] WARN render: {e}")
        return None

    def _obs_to_np(obs):
        """Convert obs to a serializable dict of numpy arrays."""
        if isinstance(obs, dict):
            result = {}
            for k, v in obs.items():
                if isinstance(v, dict):
                    result[k] = {kk: _as_np(vv).astype(np.float32) for kk, vv in v.items()}
                elif isinstance(v, (torch.Tensor, np.ndarray)):
                    result[k] = _as_np(v).astype(np.float32)
                else:
                    try:
                        result[k] = float(v)
                    except (TypeError, ValueError):
                        pass  # skip non-numeric
            return result
        return {"flat": _as_np(obs).astype(np.float32)}

    def _process_request(srv, op, payload):
        if op == "reset":
            obs = srv.env.reset()
            if isinstance(obs, tuple):
                obs = obs[0]
            srv._last_obs = obs
            srv._episode += 1
            proprio = extract_proprio(obs)
            frame = _render_frame(srv.env)
            return _serialize({"obs": _obs_to_np(obs), "proprio": proprio, "frame": frame, "episode": srv._episode})

        elif op == "step":
            action = payload
            if isinstance(action, np.ndarray):
                action = torch.from_numpy(action).float().to("cuda:0")
            if isinstance(action, torch.Tensor) and action.dim() == 1:
                action = action.unsqueeze(0)
            out = srv.env.step(action)
            if len(out) == 5:
                obs, r, term, trunc, info = out
            else:
                obs, r, done, info = out
                term, trunc = bool(done), False
            srv._last_obs = obs
            proprio = extract_proprio(obs)
            frame = _render_frame(srv.env)
            r_val = float(_as_np(r)) if isinstance(r, (torch.Tensor, np.ndarray)) else float(r)
            t_val = bool(_as_np(term)) if isinstance(term, torch.Tensor) else bool(term)
            tr_val = bool(_as_np(trunc)) if isinstance(trunc, torch.Tensor) else bool(trunc)
            return _serialize({
                "obs": _obs_to_np(obs), "proprio": proprio, "frame": frame,
                "reward": r_val, "terminated": t_val, "truncated": tr_val, "info": {},
            })

        elif op == "render":
            frame = _render_frame(srv.env)
            return _serialize({"frame": frame})

        elif op == "getspec":
            obs = srv._last_obs
            if obs is None:
                obs = srv.env.reset()
                if isinstance(obs, tuple):
                    obs = obs[0]
                srv._last_obs = obs
            p = extract_proprio(obs)
            action_dim = int(np.prod(getattr(srv.env, "action_space").shape))
            return _serialize({"proprio_dim": int(p.shape[0]), "action_dim": action_dim})

        elif op == "close":
            try:
                srv.env.close()
            except Exception:
                pass
            return _serialize({"ok": True})

    def serve():
        task = os.environ.get("ISAAC_TASK", "Isaac-G1-ManipJointCtrl-v0")
        video_every = int(os.environ.get("VIDEO_EVERY", "1"))
        video_dir = os.environ.get("VIDEO_DIR", "/shared/videos") + "/" + os.environ.get("POD_NAME", "pod")
        os.makedirs(video_dir, exist_ok=True)

        print(f"[SIM] Creating environment: {task}")
        env = make_env(task, video_dir, video_every)
        joint_names = extract_joint_names(env)
        print(f"[SIM] Joint names ({len(joint_names)}): {joint_names}")

        srv = SimServer(env, joint_names)
        print(f"[SIM] Environment created: {task}")

        server = grpc.server(
            futures.ThreadPoolExecutor(max_workers=4),
            options=[
                ("grpc.max_receive_message_length", 256 * 1024 * 1024),
                ("grpc.max_send_message_length", 256 * 1024 * 1024),
            ],
        )
        handlers = {
            "Reset": grpc.unary_unary_rpc_method_handler(srv.Reset, request_deserializer=lambda x: x, response_serializer=lambda x: x),
            "Step": grpc.unary_unary_rpc_method_handler(srv.Step, request_deserializer=lambda x: x, response_serializer=lambda x: x),
            "Render": grpc.unary_unary_rpc_method_handler(srv.Render, request_deserializer=lambda x: x, response_serializer=lambda x: x),
            "GetSpec": grpc.unary_unary_rpc_method_handler(srv.GetSpec, request_deserializer=lambda x: x, response_serializer=lambda x: x),
            "GetJointNames": grpc.unary_unary_rpc_method_handler(srv.GetJointNames, request_deserializer=lambda x: x, response_serializer=lambda x: x),
            "Close": grpc.unary_unary_rpc_method_handler(srv.Close, request_deserializer=lambda x: x, response_serializer=lambda x: x),
            "Health": grpc.unary_unary_rpc_method_handler(srv.Health, request_deserializer=lambda x: x, response_serializer=lambda x: x),
        }
        server.add_generic_rpc_handlers((grpc.method_handlers_generic_handler("SimService", handlers),))
        port = os.environ.get("SIM_RPC_PORT", "7000")
        server.add_insecure_port(f"[::]:{port}")
        server.start()
        print(f"[SIM] gRPC server listening on port {port}")

        # Main loop: tick Isaac Sim and process gRPC requests on main thread
        try:
            while simulation_app.is_running():
                while not _request_queue.empty():
                    try:
                        op, payload, event, holder = _request_queue.get_nowait()
                        try:
                            holder[0] = _process_request(srv, op, payload)
                        except Exception as e:
                            holder[1] = e
                        event.set()
                    except queue.Empty:
                        break
                simulation_app.update()
        except KeyboardInterrupt:
            pass
        finally:
            server.stop(grace=5)

    if __name__ == "__main__":
        serve()

  g1_manip_env_cfg.py: |
    """
    Custom G1 manipulation environment for GR00T closed-loop evaluation.

    Uses joint position control (NOT IK) so that GR00T's per-body-part
    joint position outputs map directly to the action space.

    Registers: Isaac-G1-ManipJointCtrl-v0
    """
    import gymnasium as gym
    import math

    from isaaclab.utils import configclass
    import isaaclab.sim as sim_utils
    from isaaclab.assets import ArticulationCfg, AssetBaseCfg, RigidObjectCfg
    from isaaclab.envs import ManagerBasedRLEnvCfg
    from isaaclab.managers import ObservationGroupCfg, ObservationTermCfg, RewardTermCfg, TerminationTermCfg
    from isaaclab.scene import InteractiveSceneCfg
    import isaaclab.envs.mdp as mdp

    # Import G1 robot asset config — need full 37-DOF version with hands + torso
    # G1_MINIMAL_CFG / G1_CFG have all joints; G1_29DOF_CFG lacks hand joints
    try:
        from isaaclab_assets.robots.unitree import G1_MINIMAL_CFG as G1_ROBOT_CFG
    except ImportError:
        from isaaclab_assets.robots.unitree import G1_CFG as G1_ROBOT_CFG

    ##
    # Scene
    ##

    @configclass
    class G1ManipSceneCfg(InteractiveSceneCfg):
        """Scene: G1 robot with table, object, and lighting."""

        ground = AssetBaseCfg(
            prim_path="/World/ground",
            spawn=sim_utils.GroundPlaneCfg(),
        )

        dome_light = AssetBaseCfg(
            prim_path="/World/DomeLight",
            spawn=sim_utils.DomeLightCfg(
                color=(0.75, 0.75, 0.75),
                intensity=3000.0,
            ),
        )

        # Table in front of the robot
        table = AssetBaseCfg(
            prim_path="{ENV_REGEX_NS}/Table",
            spawn=sim_utils.CuboidCfg(
                size=(0.8, 1.2, 0.05),
                rigid_props=sim_utils.RigidBodyPropertiesCfg(kinematic_enabled=True),
                collision_props=sim_utils.CollisionPropertiesCfg(),
                visual_material=sim_utils.PreviewSurfaceCfg(diffuse_color=(0.6, 0.4, 0.2)),
            ),
            init_state=AssetBaseCfg.InitialStateCfg(pos=(0.0, 0.55, 0.4)),
        )

        # Table legs (4 legs)
        table_leg_fl = AssetBaseCfg(
            prim_path="{ENV_REGEX_NS}/TableLegFL",
            spawn=sim_utils.CylinderCfg(
                radius=0.025, height=0.4,
                rigid_props=sim_utils.RigidBodyPropertiesCfg(kinematic_enabled=True),
                collision_props=sim_utils.CollisionPropertiesCfg(),
                visual_material=sim_utils.PreviewSurfaceCfg(diffuse_color=(0.4, 0.3, 0.15)),
            ),
            init_state=AssetBaseCfg.InitialStateCfg(pos=(-0.35, 0.15, 0.2)),
        )
        table_leg_fr = AssetBaseCfg(
            prim_path="{ENV_REGEX_NS}/TableLegFR",
            spawn=sim_utils.CylinderCfg(
                radius=0.025, height=0.4,
                rigid_props=sim_utils.RigidBodyPropertiesCfg(kinematic_enabled=True),
                collision_props=sim_utils.CollisionPropertiesCfg(),
                visual_material=sim_utils.PreviewSurfaceCfg(diffuse_color=(0.4, 0.3, 0.15)),
            ),
            init_state=AssetBaseCfg.InitialStateCfg(pos=(0.35, 0.15, 0.2)),
        )
        table_leg_bl = AssetBaseCfg(
            prim_path="{ENV_REGEX_NS}/TableLegBL",
            spawn=sim_utils.CylinderCfg(
                radius=0.025, height=0.4,
                rigid_props=sim_utils.RigidBodyPropertiesCfg(kinematic_enabled=True),
                collision_props=sim_utils.CollisionPropertiesCfg(),
                visual_material=sim_utils.PreviewSurfaceCfg(diffuse_color=(0.4, 0.3, 0.15)),
            ),
            init_state=AssetBaseCfg.InitialStateCfg(pos=(-0.35, 0.95, 0.2)),
        )
        table_leg_br = AssetBaseCfg(
            prim_path="{ENV_REGEX_NS}/TableLegBR",
            spawn=sim_utils.CylinderCfg(
                radius=0.025, height=0.4,
                rigid_props=sim_utils.RigidBodyPropertiesCfg(kinematic_enabled=True),
                collision_props=sim_utils.CollisionPropertiesCfg(),
                visual_material=sim_utils.PreviewSurfaceCfg(diffuse_color=(0.4, 0.3, 0.15)),
            ),
            init_state=AssetBaseCfg.InitialStateCfg(pos=(0.35, 0.95, 0.2)),
        )

        # Object on the table (small red cube)
        cube_object: RigidObjectCfg = RigidObjectCfg(
            prim_path="{ENV_REGEX_NS}/CubeObject",
            spawn=sim_utils.CuboidCfg(
                size=(0.06, 0.06, 0.06),
                rigid_props=sim_utils.RigidBodyPropertiesCfg(),
                mass_props=sim_utils.MassPropertiesCfg(mass=0.1),
                collision_props=sim_utils.CollisionPropertiesCfg(),
                visual_material=sim_utils.PreviewSurfaceCfg(diffuse_color=(0.9, 0.15, 0.15)),
            ),
            init_state=RigidObjectCfg.InitialStateCfg(pos=(-0.15, 0.55, 0.46)),
        )

        # Robot
        robot: ArticulationCfg = G1_ROBOT_CFG.replace(
            prim_path="{ENV_REGEX_NS}/Robot",
        )

        def __post_init__(self):
            """Fix the robot's root link so it doesn't fall over."""
            self.robot.spawn.articulation_props.fix_root_link = True

    ##
    # Observations
    ##

    @configclass
    class ObservationsCfg:
        @configclass
        class PolicyCfg(ObservationGroupCfg):
            """Absolute joint positions and velocities for the robot."""
            joint_pos = ObservationTermCfg(func=mdp.joint_pos)
            joint_vel = ObservationTermCfg(func=mdp.joint_vel_rel)

            def __post_init__(self):
                self.enable_corruption = False
                self.concatenate_terms = True

        policy: PolicyCfg = PolicyCfg()

    ##
    # Actions
    ##

    @configclass
    class ActionsCfg:
        """Joint position control — absolute targets (matching GR00T output)."""
        joint_pos = mdp.JointPositionActionCfg(
            asset_name="robot",
            joint_names=[".*"],
            scale=1.0,
            use_default_offset=False,
        )

    ##
    # Rewards (minimal — eval only, no training)
    ##

    @configclass
    class RewardsCfg:
        """No rewards needed for evaluation."""
        pass

    ##
    # Terminations
    ##

    @configclass
    class TerminationsCfg:
        """Time-based termination only."""
        time_out = TerminationTermCfg(func=mdp.time_out, time_out=True)

    ##
    # Environment
    ##

    @configclass
    class G1ManipJointCtrlEnvCfg(ManagerBasedRLEnvCfg):
        """G1 manipulation env with joint position control."""

        scene: G1ManipSceneCfg = G1ManipSceneCfg(num_envs=1, env_spacing=5.0)
        observations: ObservationsCfg = ObservationsCfg()
        actions: ActionsCfg = ActionsCfg()
        rewards: RewardsCfg = RewardsCfg()
        terminations: TerminationsCfg = TerminationsCfg()

        episode_length_s = 120.0  # 2 minutes per eval episode

        def __post_init__(self):
            # Simulation settings
            self.sim.dt = 0.005  # 200 Hz physics
            self.decimation = 4  # 50 Hz control
            self.sim.render_interval = self.decimation
            # Viewer camera: front-right angle showing robot + table
            self.viewer.eye = (1.5, -0.5, 1.2)
            self.viewer.lookat = (0.0, 0.5, 0.6)

    ##
    # Register with Gymnasium
    ##

    gym.register(
        id="Isaac-G1-ManipJointCtrl-v0",
        entry_point="isaaclab.envs:ManagerBasedRLEnv",
        disable_env_checker=True,
        kwargs={
            "env_cfg_entry_point": f"{__name__}:G1ManipJointCtrlEnvCfg",
        },
    )

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: groot-eval-client-scripts
data:
  eval_entrypoint.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    export DEBIAN_FRONTEND=noninteractive
    apt-get update -y
    apt-get install -y --no-install-recommends python3.10 python3.10-venv python3.10-dev git ffmpeg ca-certificates
    rm -rf /var/lib/apt/lists/*

    python3.10 -m venv /opt/venv
    source /opt/venv/bin/activate
    python -m pip install --upgrade pip

    # PyTorch CUDA wheels
    export PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu121
    python -m pip install --no-cache-dir \
      torch==2.7.1 torchvision==0.22.1 \
      wandb==0.25.0 \
      transformers==4.51.3 accelerate==0.33.0 safetensors==0.4.5 \
      grpcio==1.66.2 numpy==1.26.4 \
      albumentations==1.4.18 diffusers==0.35.1 dm-tree==0.1.8 \
      datasets==3.6.0 peft==0.17.1 msgpack==1.1.0 msgpack-numpy==0.4.8 \
      omegaconf==2.3.0 tyro==0.9.17 \
      einops scipy termcolor lmdb av pyzmq click imageio imageio-ffmpeg

    # Install GR00T repo (--no-deps; flash-attn skipped)
    if [[ ! -d /workspace/Isaac-GR00T ]]; then
      git clone --depth 1 https://github.com/NVIDIA/Isaac-GR00T /workspace/Isaac-GR00T
    fi
    python -m pip install --no-deps -e /workspace/Isaac-GR00T
    export PYTHONPATH="/workspace/Isaac-GR00T${PYTHONPATH:+:${PYTHONPATH}}"

    # Patch: flash_attention_2 -> sdpa
    python -c "
    import re
    path = '/workspace/Isaac-GR00T/gr00t/model/modules/eagle_backbone.py'
    with open(path) as f: code = f.read()
    code = code.replace('\"flash_attention_2\"', '\"sdpa\"')
    code = code.replace(
        'self.model = AutoModel.from_config(config, trust_remote_code=True)',
        'config._attn_implementation = \"sdpa\"\n            self.model = AutoModel.from_config(config, trust_remote_code=True, attn_implementation=\"sdpa\")'
    )
    with open(path, 'w') as f: f.write(code)
    print('[patch] eagle_backbone.py: flash_attention_2 -> sdpa')
    "

    # Patch: Eagle VL model code — comprehensive flash_attn → SDPA
    python << 'EAGLE_PATCH'
    import os
    eagle_dir = "/workspace/Isaac-GR00T/gr00t/model/modules/nvidia/Eagle-Block2A-2B-v2"
    patched = 0
    for root, dirs, files in os.walk(eagle_dir):
        for fname in files:
            if not fname.endswith(".py"):
                continue
            fpath = os.path.join(root, fname)
            with open(fpath) as f:
                code = f.read()
            orig = code
            # Replace flash_attention_2 string references
            if "flash_attention_2" in code:
                code = code.replace(
                    "assert config.text_config._attn_implementation == 'flash_attention_2'",
                    "pass  # PATCHED: removed flash_attention_2 requirement"
                )
                code = code.replace(
                    'assert config.text_config._attn_implementation == "flash_attention_2"',
                    "pass  # PATCHED: removed flash_attention_2 requirement"
                )
                code = code.replace("'flash_attention_2'", "'sdpa'")
                code = code.replace('"flash_attention_2"', '"sdpa"')
            if code != orig:
                with open(fpath, "w") as f:
                    f.write(code)
                patched += 1
                print(f"[patch] Patched {fpath}")
    print(f"[patch] Patched {patched} Eagle VL file(s)")

    EAGLE_PATCH

    # Comprehensive flash_attn stub: make flash_attn importable with SDPA fallbacks
    python /scripts/create_flash_attn_stub.py

    # Copy modality config
    cp /scripts/g1_teleop_config.py /workspace/Isaac-GR00T/g1_teleop_config.py

    # Wait for sim RPC to be ready
    python /scripts/wait_for_sim.py

    # Run evaluation
    python /scripts/eval_client.py

  create_flash_attn_stub.py: |
    """Create flash_attn SDPA stub package so Eagle model code can import it."""
    import os
