    """
    Bidirectional joint mapping between Isaac Lab flat DOF vectors and
    GR00T per-body-part observation/action format.

    The GR00T model was trained on G1 teleop data with 43 DOFs per body part:
      waist=3, left_arm=7, right_arm=7, left_hand=7, right_hand=7,
      left_leg=6, right_leg=6
    Isaac Lab's G1_MINIMAL_CFG has 37 DOFs (1 waist, 5 per arm, 7 per hand,
    6 per leg). This mapper pads the missing dimensions (waist roll/pitch,
    wrist joints) with zeros for state, and trims action output accordingly.
    """
    import numpy as np
    from typing import Optional

    # Expected dimensions per body part (from training data statistics.json)
    EXPECTED_DIMS = {
        "left_leg": 6,
        "right_leg": 6,
        "waist": 3,
        "left_arm": 7,
        "left_hand": 7,
        "right_arm": 7,
        "right_hand": 7,
    }

    # G1 body parts -> sim joint names (from G1_MINIMAL_CFG / G1_CFG)
    # Order within each body part matches the training data convention:
    #   waist: [yaw, roll, pitch] — sim only has torso_joint (≈yaw)
    #   arm: [shoulder_p, shoulder_r, shoulder_y, elbow_p, elbow_r, wrist?, wrist?]
    #         sim has first 5, training expects 7
    G1_BODY_PARTS = {
        "waist": ["torso_joint"],
        "left_arm": [
            "left_shoulder_pitch_joint",
            "left_shoulder_roll_joint",
            "left_shoulder_yaw_joint",
            "left_elbow_pitch_joint",
            "left_elbow_roll_joint",
        ],
        "right_arm": [
            "right_shoulder_pitch_joint",
            "right_shoulder_roll_joint",
            "right_shoulder_yaw_joint",
            "right_elbow_pitch_joint",
            "right_elbow_roll_joint",
        ],
        "left_hand": [
            "left_five_joint",
            "left_three_joint",
            "left_zero_joint",
            "left_six_joint",
            "left_four_joint",
            "left_one_joint",
            "left_two_joint",
        ],
        "right_hand": [
            "right_five_joint",
            "right_three_joint",
            "right_zero_joint",
            "right_six_joint",
            "right_four_joint",
            "right_one_joint",
            "right_two_joint",
        ],
        "left_leg": [
            "left_hip_pitch_joint",
            "left_hip_roll_joint",
            "left_hip_yaw_joint",
            "left_knee_joint",
            "left_ankle_pitch_joint",
            "left_ankle_roll_joint",
        ],
        "right_leg": [
            "right_hip_pitch_joint",
            "right_hip_roll_joint",
            "right_hip_yaw_joint",
            "right_knee_joint",
            "right_ankle_pitch_joint",
            "right_ankle_roll_joint",
        ],
    }


    # Which body parts use RELATIVE action representation (deltas from current state).
    # These must be added to current joint positions before sending to the sim.
    # (Matches the action_configs order in g1_teleop_config.py)
    RELATIVE_PARTS = {"left_leg", "right_leg", "left_arm", "right_arm"}
    # These body parts use ABSOLUTE action representation (direct joint targets).
    ABSOLUTE_PARTS = {"waist", "left_hand", "right_hand"}


    class G1JointMapper:
        """Maps between Isaac Lab flat joint vectors and GR00T body-part dicts.

        Handles dimension mismatch between sim (37 DOFs) and training data (43 DOFs)
        by padding state with zeros and trimming actions.

        Also handles RELATIVE vs ABSOLUTE action conversion: body parts trained with
        RELATIVE actions output deltas, which must be added to the current joint state
        before sending as absolute position targets to the sim.
        """

        def __init__(self, sim_joint_names: list[str]):
            self.sim_joint_names = sim_joint_names
            self.n_joints = len(sim_joint_names)

            # Build index mapping: body_part -> [indices into flat sim vector]
            self.part_indices = {}
            self.part_names = {}
            for part, joints in G1_BODY_PARTS.items():
                indices = []
                found = []
                for j in joints:
                    if j in sim_joint_names:
                        indices.append(sim_joint_names.index(j))
                        found.append(j)
                if indices:
                    self.part_indices[part] = indices
                    self.part_names[part] = found
                else:
                    # Even if no joints found, still register the part for padding
                    self.part_indices[part] = []
                    self.part_names[part] = []

                expected = EXPECTED_DIMS.get(part, len(indices))
                n_sim = len(indices)
                status = "OK" if n_sim == expected else f"PADDED ({n_sim} sim -> {expected} expected)"
                print(f"[mapper] {part}: {n_sim} sim DOFs, {expected} expected DOFs [{status}]")

            mapped = sum(len(v) for v in self.part_indices.values())
            total_expected = sum(EXPECTED_DIMS.values())
            print(f"[mapper] Mapped {mapped}/{self.n_joints} sim joints across {len(self.part_indices)} body parts")
            print(f"[mapper] Model expects {total_expected} total DOFs, sim has {self.n_joints}")

        def flat_to_parts(self, flat_vec: np.ndarray) -> dict[str, np.ndarray]:
            """Split flat joint vector into per-body-part arrays with expected dimensions.

            Pads with zeros if the sim has fewer joints than the model expects.
            """
            flat = np.asarray(flat_vec, dtype=np.float32).reshape(-1)
            parts = {}
            for part, indices in self.part_indices.items():
                expected_dim = EXPECTED_DIMS.get(part, len(indices))
                padded = np.zeros(expected_dim, dtype=np.float32)
                # Fill sim values into the first N positions
                n_sim = min(len(indices), expected_dim)
                for i in range(n_sim):
                    if indices[i] < len(flat):
                        padded[i] = flat[indices[i]]
                parts[part] = padded
            return parts

        def parts_to_flat(self, parts: dict[str, np.ndarray], default: float = 0.0) -> np.ndarray:
            """Merge per-body-part arrays into a flat sim joint vector.

            Only uses the first N values from each body part (matching sim joints),
            discards extra DOFs (e.g. wrist actions) that the sim doesn't support.
            """
            flat = np.full(self.n_joints, default, dtype=np.float32)
            for part, indices in self.part_indices.items():
                if part in parts:
                    vals = np.asarray(parts[part], dtype=np.float32).reshape(-1)
                    # Only copy values for joints that exist in sim
                    n = min(len(indices), len(vals))
                    for i in range(n):
                        flat[indices[i]] = vals[i]
            return flat

        def obs_to_groot(
            self,
            flat_joints: np.ndarray,
            camera_frame: Optional[np.ndarray],
            task_description: str,
        ) -> dict:
            """
            Convert Isaac Lab observations to GR00T nested input format.

            Returns dict with top-level keys: video, state, language
              - video: {"rs_view": (B=1, T=1, H, W, 3) uint8}
              - state: {body_part: (B=1, T=1, D) float32} where D = EXPECTED_DIMS[part]
              - language: {"annotation.human.task_description": [["task desc"]]}
            """
            # State: split flat joints into body parts, padded to expected dims
            state = {}
            parts = self.flat_to_parts(flat_joints)
            for part, vals in parts.items():
                state[part] = vals.reshape(1, 1, -1).astype(np.float32)

            # Video: (B=1, T=1, H, W, 3) uint8
            if camera_frame is not None:
                frame = np.asarray(camera_frame, dtype=np.uint8)
                if frame.ndim == 3:  # (H, W, C)
                    frame = frame[np.newaxis, np.newaxis, ...]  # (1, 1, H, W, C)
                elif frame.ndim == 4:  # (1, H, W, C)
                    frame = frame[:, np.newaxis, ...]
            else:
                frame = np.zeros((1, 1, 224, 224, 3), dtype=np.uint8)

            video = {"rs_view": frame}

            # Language
            language = {"annotation.human.task_description": [[task_description]]}

            return {"video": video, "state": state, "language": language}

        def action_chunk_from_groot(self, groot_actions: dict, current_proprio: Optional[np.ndarray] = None) -> list:
            """
            Convert GR00T per-body-part action chunk to a list of flat sim joint vectors.

            For RELATIVE body parts (arms, legs), the model outputs deltas from the
            current state. These are added to current_proprio to produce absolute targets.
            For ABSOLUTE body parts (waist, hands), the model outputs direct targets.

            groot_actions keys: {body_part} with shape (B, T, D) where T=16 (action horizon).
            current_proprio: flat (n_joints,) current joint positions from the sim.
            Returns: list of T flat numpy arrays, each of shape (n_joints,)
            """
            # Get current state per body part (for relative→absolute conversion)
            current_parts = {}
            if current_proprio is not None:
                current_parts = self.flat_to_parts(current_proprio)

            # Determine chunk size T from the first available action
            T = 1
            for part in self.part_indices:
                for key in (f"action.{part}", part):
                    if key in groot_actions:
                        val = np.asarray(groot_actions[key], dtype=np.float32)
                        # Shape is (B, T, D) — get T
                        if val.ndim >= 2:
                            T = val.shape[-2] if val.ndim == 3 else val.shape[0]
                            if val.ndim == 3:
                                T = val.shape[1]
                        break
                break

            flat_actions = []

            for t in range(T):
                parts = {}
                for part in self.part_indices:
                    val = None
                    for key in (f"action.{part}", part):
                        if key in groot_actions:
                            val = np.asarray(groot_actions[key], dtype=np.float32)
                            break
                    if val is None:
                        continue
                    # Extract timestep t: (B, T, D) -> (D,)
                    if val.ndim == 3:
                        val = val[0, t, :]  # first batch, timestep t
                    elif val.ndim == 2:
                        val = val[t, :]
                    else:
                        pass  # already 1D

                    # Convert RELATIVE actions to ABSOLUTE by adding current state
                    # Each timestep t is a delta from the ORIGINAL state at query time
                    # (NOT accumulated: delta[t] means "offset from current" at future t)
                    if part in RELATIVE_PARTS and part in current_parts:
                        n = min(len(val), len(current_parts[part]))
                        absolute = current_parts[part].copy()
                        absolute[:n] += val[:n]
                        parts[part] = absolute
                    else:
                        # ABSOLUTE parts: use model output directly
                        parts[part] = val

                flat_actions.append(self.parts_to_flat(parts, default=0.0))

            return flat_actions

