    """
    GR00T closed-loop evaluation client for Isaac Lab.

    Iterates over sweep trial artifacts from W&B, loads each GR00T checkpoint,
    runs rollouts in Isaac Lab via gRPC, and logs videos + metrics to W&B.
    """
    import os, sys, time, shutil, pickle
    from pathlib import Path
    import numpy as np
    import grpc
    import wandb
    import imageio

    # Register modality config
    sys.path.insert(0, "/workspace/Isaac-GR00T")
    import g1_teleop_config  # noqa: F401

    from gr00t.data.embodiment_tags import EmbodimentTag
    from gr00t.policy.gr00t_policy import Gr00tPolicy

    # Import joint mapper
    sys.path.insert(0, "/scripts")
    from g1_joint_mapper import G1JointMapper, RELATIVE_PARTS, ABSOLUTE_PARTS

    # ---- Configuration ----
    ENTITY = os.environ.get("WANDB_ENTITY", "wandb-smle")
    PROJECT = os.environ.get("WANDB_PROJECT", "isaacsim-nvidia-vla-crwv")
    N_EPISODES = int(os.environ.get("N_EPISODES", "10"))
    MAX_STEPS = int(os.environ.get("MAX_EPISODE_STEPS", "500"))
    TASK_DESC = os.environ.get("TASK_DESCRIPTION", "Pick up the apple and place it on the plate")
    SIM_ADDR = os.environ.get("SIM_RPC_ADDR", "127.0.0.1:7000")
    VIDEO_DIR = Path(os.environ.get("VIDEO_DIR", "/shared/eval_videos"))


    class SimClient:
        """gRPC client for the Isaac Lab sim server."""

        def __init__(self, addr: str):
            self.channel = grpc.insecure_channel(
                addr,
                options=[
                    ("grpc.max_receive_message_length", 256 * 1024 * 1024),
                    ("grpc.max_send_message_length", 256 * 1024 * 1024),
                ],
            )
            self._reset = self.channel.unary_unary(
                "/SimService/Reset",
                request_serializer=self._ser, response_deserializer=self._deser,
            )
            self._step = self.channel.unary_unary(
                "/SimService/Step",
                request_serializer=self._ser, response_deserializer=self._deser,
            )
            self._render = self.channel.unary_unary(
                "/SimService/Render",
                request_serializer=self._ser, response_deserializer=self._deser,
            )
            self._spec = self.channel.unary_unary(
                "/SimService/GetSpec",
                request_serializer=self._ser, response_deserializer=self._deser,
            )
            self._joint_names = self.channel.unary_unary(
                "/SimService/GetJointNames",
                request_serializer=self._ser, response_deserializer=self._deser,
            )
            self._close = self.channel.unary_unary(
                "/SimService/Close",
                request_serializer=self._ser, response_deserializer=self._deser,
            )

        @staticmethod
        def _ser(x):
            return pickle.dumps(x, protocol=pickle.HIGHEST_PROTOCOL)

        @staticmethod
        def _deser(x):
            return pickle.loads(x)

        def reset(self):
            return self._reset({})

        def step(self, action):
            return self._step({"action": action})

        def render(self):
            return self._render({})

        def get_spec(self):
            return self._spec({})

        def get_joint_names(self):
            resp = self._joint_names({})
            return resp.get("joint_names", [])


    def extract_proprio(obs):
        """Extract flat proprioception vector from Isaac Lab observation."""
        if isinstance(obs, dict):
            for k in ("policy", "proprio", "joint_pos", "qpos", "state"):
                if k in obs:
                    v = obs[k]
                    if isinstance(v, dict):
                        parts = [np.asarray(vv, dtype=np.float32).reshape(-1) for vv in v.values()]
                        return np.concatenate(parts)
                    return np.asarray(v, dtype=np.float32).reshape(-1)
            for v in obs.values():
                v = np.asarray(v)
                if v.ndim == 1 and v.size < 512:
                    return v.astype(np.float32)
        arr = np.asarray(obs, dtype=np.float32)
        return arr.reshape(-1)


    def run_episode(policy, sim: SimClient, mapper: G1JointMapper, ep_idx: int, video_dir: Path):
        """Run one evaluation episode. Returns metrics dict + video path."""
        print(f"  [ep {ep_idx}] Resetting...")
        resp = sim.reset()
        obs = resp.get("obs", {})
        frame = resp.get("frame")

        proprio = resp.get("proprio")
        if proprio is None:
            proprio = extract_proprio(obs)

        print(f"  [ep {ep_idx}] Reset done. proprio shape={proprio.shape}, "
              f"frame={'None' if frame is None else str(np.asarray(frame).shape)}")

        frames = []
        if frame is not None:
            frames.append(np.asarray(frame, dtype=np.uint8))

        total_reward = 0.0
        terminated = False
        policy_errors = 0
        step = 0

        action_chunk = []  # buffered action chunk from GR00T
        chunk_idx = 0      # current position in chunk

        for step in range(MAX_STEPS):
            # Re-query policy when chunk is exhausted
            if chunk_idx >= len(action_chunk):
                groot_obs = mapper.obs_to_groot(proprio, frame, TASK_DESC)
                try:
                    action_dict, _info = policy.get_action(groot_obs)
                    action_chunk = mapper.action_chunk_from_groot(action_dict, current_proprio=proprio)
                    chunk_idx = 0
                    if step == 0 and ep_idx == 0:
                        print(f"    Action chunk size: {len(action_chunk)}")
                        print(f"    Chunk[0] range: [{action_chunk[0].min():.4f}, {action_chunk[0].max():.4f}]")
                        print(f"    Chunk[-1] range: [{action_chunk[-1].min():.4f}, {action_chunk[-1].max():.4f}]")
                        # Log relative vs absolute handling
                        print(f"    RELATIVE parts (delta→absolute): {RELATIVE_PARTS}")
                        print(f"    ABSOLUTE parts (direct target): {ABSOLUTE_PARTS}")
                except Exception as e:
                    policy_errors += 1
                    if policy_errors <= 3:
                        print(f"  [ep {ep_idx}] Policy error at step {step}: {e}")
                        import traceback; traceback.print_exc()
                    action_chunk = [np.zeros(mapper.n_joints, dtype=np.float32)]
                    chunk_idx = 0

            flat_action = action_chunk[chunk_idx]
            chunk_idx += 1

            # Step simulation
            try:
                resp = sim.step(flat_action)
            except Exception as e:
                print(f"  [ep {ep_idx}] Sim error at step {step}: {e}")
                break

            obs = resp.get("obs", {})
            frame = resp.get("frame")
            reward = resp.get("reward", 0.0)
            terminated = resp.get("terminated", False)
            truncated = resp.get("truncated", False)

            proprio = resp.get("proprio")
            if proprio is None:
                proprio = extract_proprio(obs)
            total_reward += reward

            if frame is not None:
                frames.append(np.asarray(frame, dtype=np.uint8))

            if step < 3:
                print(f"  [ep {ep_idx}] Step {step}: reward={reward:.4f}, "
                      f"term={terminated}, trunc={truncated}, "
                      f"action=[{flat_action.min():.3f},{flat_action.max():.3f}]")

            if terminated or truncated:
                print(f"  [ep {ep_idx}] Done at step {step}: term={terminated}, trunc={truncated}")
                break

        if policy_errors > 0:
            print(f"  [ep {ep_idx}] Total policy errors: {policy_errors}/{step+1} steps")

        # Save video
        video_path = None
        if frames:
            video_dir.mkdir(parents=True, exist_ok=True)
            video_path = video_dir / f"episode_{ep_idx}.mp4"
            try:
                writer = imageio.get_writer(str(video_path), fps=20, codec="libx264",
                                            output_params=["-crf", "22", "-pix_fmt", "yuv420p"])
                for f in frames:
                    if f.ndim == 2:
                        f = np.stack([f, f, f], axis=-1)
                    if f.ndim == 4:
                        f = f[0]
                    writer.append_data(f)
                writer.close()
                print(f"  [ep {ep_idx}] Video saved: {video_path} ({len(frames)} frames)")
            except Exception as e:
                print(f"  [ep {ep_idx}] Video save failed: {e}")
                video_path = None

        return {
            "total_reward": total_reward,
            "episode_length": step + 1,
            "terminated": terminated,
            "video_path": str(video_path) if video_path else None,
            "n_frames": len(frames),
        }


    def eval_checkpoint(ckpt_path: str, sim: SimClient, mapper: G1JointMapper, ckpt_name: str):
        """Evaluate one GR00T checkpoint across N episodes."""
        import torch

        print(f"\n[eval] Loading GR00T policy from {ckpt_path}")
        policy = Gr00tPolicy(
            embodiment_tag=EmbodimentTag.NEW_EMBODIMENT,
            model_path=ckpt_path,
            device="cuda:0",
        )
        print(f"[eval] Policy loaded. Running {N_EPISODES} episodes...")

        video_dir = VIDEO_DIR / ckpt_name
        results = []

        for ep in range(N_EPISODES):
            metrics = run_episode(policy, sim, mapper, ep, video_dir)
            results.append(metrics)
            print(f"  [ep {ep}] reward={metrics['total_reward']:.3f}, "
                  f"length={metrics['episode_length']}, "
                  f"terminated={metrics['terminated']}")

        # Free GPU memory
        del policy
        torch.cuda.empty_cache()

        return results


    def log_to_wandb(run, ckpt_name: str, trial_name: str, results: list, metadata: dict):
        """Log evaluation results to W&B."""
        rewards = [r["total_reward"] for r in results]
        lengths = [r["episode_length"] for r in results]
        terminated = [r["terminated"] for r in results]

        # Summary scalars
        wandb.log({
            "eval/mean_reward": float(np.mean(rewards)),
            "eval/mean_episode_length": float(np.mean(lengths)),
            "eval/termination_rate": float(np.mean(terminated)),
        })

        # Metrics table
        table = wandb.Table(columns=[
            "checkpoint", "trial", "episode", "total_reward", "episode_length", "terminated",
        ])
        for ep_idx, r in enumerate(results):
            table.add_data(ckpt_name, trial_name, ep_idx,
                          r["total_reward"], r["episode_length"], r["terminated"])
        wandb.log({"eval/metrics": table})

        # Rollout videos — all under one "eval/rollout" key for a single panel
        for ep_idx, r in enumerate(results):
            if r["video_path"] and os.path.exists(r["video_path"]):
                try:
                    vid = wandb.Video(r["video_path"], format="mp4", fps=20,
                                      caption=f"{ckpt_name} ep{ep_idx}")
                    wandb.log({"eval/rollout": vid})
                except Exception as e:
                    print(f"[eval] WARN: video upload failed for ep {ep_idx}: {e}")

        # Run summary
        run.summary["eval/mean_reward"] = float(np.mean(rewards))
        run.summary["eval/mean_episode_length"] = float(np.mean(lengths))
        run.summary["eval/termination_rate"] = float(np.mean(terminated))
        run.summary["eval/n_episodes"] = N_EPISODES
        run.summary["eval/checkpoint"] = ckpt_name
        run.summary["eval/training_loss"] = metadata.get("best_loss", "N/A")
        run.summary["status"] = "success"

        print(f"[eval] {trial_name}: mean_reward={np.mean(rewards):.3f}, "
              f"mean_length={np.mean(lengths):.1f}, "
              f"termination_rate={np.mean(terminated):.2f}")


    def main():
        print("=" * 60)
        print("[eval] GR00T Isaac Lab Closed-Loop Evaluation")
        print(f"[eval] Entity: {ENTITY}, Project: {PROJECT}")
        print(f"[eval] Episodes: {N_EPISODES}, Max steps: {MAX_STEPS}")
        print(f"[eval] Task: {TASK_DESC}")
        print("=" * 60)

        # Connect to sim
        sim = SimClient(SIM_ADDR)
        spec = sim.get_spec()
        print(f"[eval] Sim spec: proprio_dim={spec['proprio_dim']}, action_dim={spec['action_dim']}")

        # Get joint names for mapping
        joint_names = sim.get_joint_names()
        if not joint_names:
            print("[eval] WARN: No joint names from sim. Using spec-based fallback.")
            # Create dummy joint names for flat vector mapping
            joint_names = [f"joint_{i}" for i in range(spec["action_dim"])]

        mapper = G1JointMapper(joint_names)

        # Query W&B for sweep trial artifacts (retry with backoff if none found yet)
        max_wait = int(os.environ.get("ARTIFACT_WAIT_MINUTES", "60"))
        poll_interval = 60  # seconds
        trial_artifacts = []

        for attempt in range(max(1, max_wait)):
            api = wandb.Api()
            trial_artifacts = []
            try:
                for col in api.artifact_type("model", f"{ENTITY}/{PROJECT}").collections():
                    if "groot-bc-g1-trial" in col.name:
                        for art in col.artifacts():
                            trial_artifacts.append(art)
            except Exception as e:
                print(f"[eval] Error querying artifacts: {e}")

            if trial_artifacts:
                break

            # Check for local checkpoint as fallback
            local_ckpt = os.environ.get("LOCAL_CHECKPOINT")
            if local_ckpt and os.path.exists(local_ckpt):
                print(f"[eval] Using local checkpoint: {local_ckpt}")
                run = wandb.init(
                    entity=ENTITY, project=PROJECT,
                    name="isaaclab-eval-local",
                    job_type="isaaclab-eval",
                    config={"n_episodes": N_EPISODES, "max_steps": MAX_STEPS, "task": TASK_DESC},
                )
                results = eval_checkpoint(local_ckpt, sim, mapper, "local")
                log_to_wandb(run, "local", "local", results, {})
                wandb.finish()
                return

            print(f"[eval] No artifacts found yet. Waiting {poll_interval}s... "
                  f"(attempt {attempt+1}/{max_wait})")
            time.sleep(poll_interval)

        if not trial_artifacts:
            print(f"[eval] No groot-bc-g1-trial artifacts found after {max_wait} min. "
                  "Sleeping indefinitely (scale down manually).")
            while True:
                time.sleep(3600)
            return

        # Track evaluated artifacts to avoid duplicates
        evaluated_file = Path("/workspace/eval_artifacts/.evaluated")
        evaluated_set = set()
        if evaluated_file.exists():
            evaluated_set = set(evaluated_file.read_text().strip().split("\n"))

        def eval_artifacts(trial_artifacts, sim, mapper):
            """Evaluate new (unevaluated) artifacts. Returns count of newly evaluated."""
            nonlocal evaluated_set
            new_count = 0
            for i, artifact in enumerate(trial_artifacts):
                art_key = f"{artifact.name}:{artifact.version}"
                if art_key in evaluated_set:
                    print(f"[eval] Skipping already-evaluated: {art_key}")
                    continue

                meta = artifact.metadata or {}
                trial_name = meta.get("trial_name", f"trial-{i}")
                best_loss = meta.get("best_loss", "N/A")

                print(f"\n{'=' * 60}")
                print(f"[eval] [{i+1}/{len(trial_artifacts)}] {artifact.name}")
                print(f"[eval] Trial: {trial_name}, Training loss: {best_loss}")
                print(f"{'=' * 60}")

                # Download checkpoint
                ckpt_dir = artifact.download(root=f"/workspace/eval_artifacts/{artifact.name}")
                model_dir = os.path.join(ckpt_dir, "model")
                if not os.path.exists(os.path.join(model_dir, "config.json")):
                    model_dir = ckpt_dir

                # Resume the ORIGINAL sweep run to log eval under the same run
                source_run_id = meta.get("run_id")
                if not source_run_id:
                    try:
                        source_run = artifact.logged_by()
                        source_run_id = source_run.id
                        print(f"[eval] Got run_id from artifact.logged_by(): {source_run_id}")
                    except Exception as e:
                        print(f"[eval] Could not get source run: {e}")

                # Run eval FIRST (doesn't need W&B)
                ckpt_name = meta.get("checkpoint", artifact.name.split(":")[0])
                try:
                    results = eval_checkpoint(model_dir, sim, mapper, ckpt_name)
                except Exception as e:
                    print(f"[eval] ERROR during rollout: {e}")
                    import traceback; traceback.print_exc()
                    results = None

                # Then try to log to W&B
                if results is not None:
                    run = None
                    try:
                        if source_run_id:
                            print(f"[eval] Resuming original run: {source_run_id} ({trial_name})")
                            run = wandb.init(
                                entity=ENTITY, project=PROJECT,
                                id=source_run_id,
                                resume="allow",
                                settings=wandb.Settings(init_timeout=120),
                            )
                        else:
                            run = wandb.init(
                                entity=ENTITY, project=PROJECT,
                                name=f"isaaclab-eval-{trial_name}",
                                job_type="isaaclab-eval",
                                settings=wandb.Settings(init_timeout=120),
                            )
                        log_to_wandb(run, ckpt_name, trial_name, results, meta)
                    except Exception as e:
                        print(f"[eval] WARN: W&B logging failed: {e}")
                        print(f"[eval] Videos saved locally at /shared/eval_videos/{ckpt_name}/")
                    finally:
                        try:
                            wandb.finish(quiet=True)
                        except Exception:
                            pass

                # Mark as evaluated
                evaluated_set.add(art_key)
                evaluated_file.parent.mkdir(parents=True, exist_ok=True)
                evaluated_file.write_text("\n".join(sorted(evaluated_set)))

                # Clean up downloaded artifact
                shutil.rmtree(f"/workspace/eval_artifacts/{artifact.name}", ignore_errors=True)
                new_count += 1
            return new_count

        # Initial evaluation
        print(f"[eval] Found {len(trial_artifacts)} checkpoint artifact(s)")
        eval_artifacts(trial_artifacts, sim, mapper)

        # Poll for new artifacts (sweep may produce more over time)
        poll_minutes = int(os.environ.get("POLL_MINUTES", "10"))
        print(f"\n[eval] Initial batch done. Polling for new artifacts every {poll_minutes} min...")
        while True:
            time.sleep(poll_minutes * 60)
            api = wandb.Api()
            trial_artifacts = []
            try:
                for col in api.artifact_type("model", f"{ENTITY}/{PROJECT}").collections():
                    if "groot-bc-g1-trial" in col.name:
                        for art in col.artifacts():
                            trial_artifacts.append(art)
            except Exception as e:
                print(f"[eval] Poll error: {e}")
                continue
            n_new = eval_artifacts(trial_artifacts, sim, mapper)
            if n_new > 0:
                print(f"[eval] Evaluated {n_new} new checkpoint(s).")
            else:
                print(f"[eval] No new checkpoints. {len(evaluated_set)} already evaluated. Waiting...")


    if __name__ == "__main__":
        main()

---
apiVersion: v1
kind: Service
metadata:
  name: groot-isaaclab-eval
spec:
  clusterIP: None
  selector:
    app: groot-isaaclab-eval
  ports:
    - name: grpc
      port: 7000
      targetPort: 7000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: groot-isaaclab-eval
spec:
  serviceName: groot-isaaclab-eval
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: groot-isaaclab-eval
  template:
    metadata:
      labels:
        app: groot-isaaclab-eval
    spec:
      volumes:
        - name: sim-scripts
          configMap:
            name: groot-eval-sim-scripts
            defaultMode: 0755
        - name: eval-scripts
          configMap:
            name: groot-eval-client-scripts
            defaultMode: 0755
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: shared
          emptyDir:
            sizeLimit: 200Gi
      containers:
        # ---- Isaac Lab Simulation Container ----
        - name: sim
          image: nvcr.io/nvidia/isaac-lab:2.3.2
          command: ["/bin/bash", "/scripts/sim_entrypoint.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ISAAC_TASK
              value: Isaac-G1-ManipJointCtrl-v0
            - name: VIDEO_EVERY
              value: "1"
            - name: VIDEO_DIR
              value: /shared/videos
            - name: SIM_RPC_PORT
              value: "7000"
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "16"
              memory: 64Gi
            requests:
              nvidia.com/gpu: 1
              cpu: "8"
              memory: 32Gi
          volumeMounts:
            - name: sim-scripts
              mountPath: /scripts
            - name: shm
              mountPath: /dev/shm
            - name: shared
              mountPath: /shared
        # ---- GR00T Evaluation Container ----
        - name: eval
          image: nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04
          command: ["/bin/bash", "/scripts/eval_entrypoint.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SIM_RPC_ADDR
              value: 127.0.0.1:7000
            # ---- W&B ----
            - name: WANDB_ENTITY
              value: wandb-smle
            - name: WANDB_PROJECT
              value: isaacsim-nvidia-vla-crwv
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-api-key
                  key: WANDB_API_KEY
            # ---- Eval Config ----
            - name: N_EPISODES
              value: "3"
            - name: MAX_EPISODE_STEPS
              value: "3000"
            - name: TASK_DESCRIPTION
              value: "Pick up the apple and place it on the plate"
            - name: VIDEO_DIR
              value: /shared/eval_videos
            # ---- CUDA ----
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "32"
              memory: 128Gi
            requests:
              nvidia.com/gpu: 1
              cpu: "16"
              memory: 64Gi
          volumeMounts:
            - name: eval-scripts
              mountPath: /scripts
            - name: shared
              mountPath: /shared
