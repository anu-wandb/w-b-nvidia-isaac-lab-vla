    import os, time, grpc, pickle
    def ser(x): return pickle.dumps(x, protocol=pickle.HIGHEST_PROTOCOL)
    def deser(x): return pickle.loads(x)
    addr = os.environ.get("SIM_RPC_ADDR", "127.0.0.1:7000")
    channel = grpc.insecure_channel(addr)
    health = channel.unary_unary("/SimService/Health", request_serializer=ser, response_deserializer=deser)
    for i in range(180):
        try:
            resp = health({})
            if resp.get("ok"):
                print(f"[eval] sim ready after {i+1}s")
                break
        except Exception:
            pass
        time.sleep(1)
    else:
        raise RuntimeError("sim RPC not ready after 180s")

